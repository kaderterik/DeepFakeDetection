experiment: EXP004
description: "AdamW Optimizer — Standard Adam replaced with AdamW (weight decay regularization)"

model:
  architecture: ResNet18
  pretrained: true
  num_classes: 2
  freeze_layers: false

optimizer:
  name: AdamW
  learning_rate: 0.001
  weight_decay: 0.01

training:
  epochs: 3
  batch_size: 32
  augmentation: false

data:
  dataset: FaceForensics++
  compression: C23
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

results:
  accuracy: 0.9165
  precision: 0.9216
  recall: 0.9856
  specificity: 0.5251
  f1_score: 0.9525
  roc_auc: 0.9440
  train_time_min: 25.0
