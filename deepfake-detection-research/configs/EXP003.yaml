experiment: EXP003
description: "Low Learning Rate — LR reduced from 0.001 to 0.0001 (fine-tuning strategy)"

model:
  architecture: ResNet18
  pretrained: true
  num_classes: 2
  freeze_layers: false

optimizer:
  name: Adam
  learning_rate: 0.0001
  weight_decay: 0.0

training:
  epochs: 3
  batch_size: 32
  augmentation: false

data:
  dataset: FaceForensics++
  compression: C23
  image_size: 224
  normalize_mean: [0.485, 0.456, 0.406]
  normalize_std: [0.229, 0.224, 0.225]

results:
  accuracy: 0.9412
  precision: 0.9791
  recall: 0.9511
  specificity: 0.8851
  f1_score: 0.9649
  roc_auc: 0.9782
  train_time_min: 25.0
